name: Publish Ja3 Package
on:
  workflow_dispatch: {}
  push:
    paths-ignore:
      - 'docs/**'
      - '.github/**'
      - '**.md'
      - '**.png'
      - '**.json'
    branches: [master]
    tags: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Publish Ja3 Package job
    if: github.repository == 'fengzaixing401/qd'
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Publish Ja3 Package
      uses: docker/build-push-action@v4
      if: github.ref == 'refs/heads/master'
      with:
        context: .
        file: ./Dockerfile.ja3
        platforms: linux/386,linux/arm64,linux/amd64,linux/arm/v6,linux/arm/v7
        push: true
        tags: ghcr.io/${{ github.repository }}:ja3-dev
    - name: Get version
      id: get_version
      if: startsWith(github.ref, 'refs/tags/')
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
    - name: Build Ja3-latest Package
      uses: docker/build-push-action@v4
      if: startsWith(github.ref, 'refs/tags/')
      with:
        context: .
        file: ./Dockerfile.ja3
        platforms: linux/386,linux/arm64,linux/amd64,linux/arm/v6,linux/arm/v7
        push: true
        tags: ghcr.io/${{ github.repository }}:ja3-latest,ghcr.io/${{ github.repository }}:ja3-${{ steps.get_version.outputs.VERSION }}
